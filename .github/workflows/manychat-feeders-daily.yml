name: Run ManyChat Feeders

on:
  workflow_dispatch:   # ✅ THIS gives you the "Run button"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Debug scripts
        run: npm run

      - name: Run feeders
        run: npm run feeders
