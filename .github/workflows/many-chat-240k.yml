name: ManyChat 240K Global Empire

on:
  schedule:
    # 3 AM UTC = 11 PM EDT (you can tweak)
    - cron: '0 3 * * *'
  workflow_dispatch:  # manual run button in GitHub UI
  push:
    branches: [ main ]

jobs:
  generate-manychat-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Run ManyChat 240K page generator
        run: npm run start
        env:
          NODE_OPTIONS: --max-old-space-size=4096  # give more RAM for big 240K build

      - name: ✅ Verify output
        run: |
          echo "📁 Files in ./output"
          ls -la ./output || true

          echo "📄 HTML page count:"
          find ./output -name "*.html" 2>/dev/null | wc -l | tr -d ' '

          echo "📄 Sitemap count:"
          find ./output -name "sitemap-*.xml" 2>/dev/null | wc -l | tr -d ' '

      - name: 📦 Deploy to GitHub Pages (optional)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true

      - name: 🔗 Ping Google Sitemaps (index)
        run: |
          SITEMAP_URL="https://bot.yourdomain.com/output/sitemap-manychat-1.xml"
          echo "📡 Pinging Google: https://www.google.com/ping?sitemap=${SITEMAP_URL}"
          curl -s -m 10 -I "https://www.google.com/ping?sitemap=${SITEMAP_URL}" || true

          SITEMAP_URL="https://bot.yourdomain.com/output/sitemap-manychat-index.xml"
          echo "📡 Pinging Bing: https://www.bing.com/ping?sitemap=${SITEMAP_URL}"
          curl -s -m 10 "https://www.bing.com/ping?sitemap=${SITEMAP_URL}" || true

          echo "📡 Sitemap index: ${SITEMAP_URL}"

      - name: 🎉 Final success report
        run: |
          HTML_COUNT=$(find ./output -name "*.html" 2>/dev/null | wc -l || echo 0)
          SITEMAP_COUNT=$(find ./output -name "sitemap-*.xml" 2>/dev/null | wc -l || echo 0)

          echo ""
          echo "=================================="
          echo "✅ MANYCHAT 240K EMPIRE READY"
          echo "📊 ${HTML_COUNT} ManyChat pages"
          echo "🗺️  ${SITEMAP_COUNT} sitemap files"
          echo "🚀 Pages: ./output/manychat/"
          echo "🚀 Index: ./output/sitemap-manychat-index.xml"
          echo "=================================="
