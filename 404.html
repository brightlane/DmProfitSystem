<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page Not Found | 404 Error</title>
<meta name="robots" content="noindex, follow">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f3ee;
    color: #0d0c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh; 
    text-align: center;
    padding: 20px;
  }

  .box {
    max-width: 500px;
  }

  h1 {
    font-size: 80px;
    margin: 0;
    color: #0057FF;
  }

  h2 {
    font-size: 28px;
    margin: 10px 0;
  }

  p {
    color: #4a4840;
    font-size: 16px;
    line-height: 1.6;
  }

  a {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 28px;
    background: #0057FF;
    color: #fff;
    text-decoration: none;
    border-radius: 100px;
    font-weight: bold;
  }

  a:hover {
    background: #0040cc;
  }

  .small {
    margin-top: 20px;
    font-size: 12px;
    color: #9b9890;
  }
</style>
</head>

<body>

<div class="box">
  <h1>404</h1>
  <h2>Page not found</h2>

  <p>
    The page you’re looking for doesn’t exist or has been moved.
    But you can still access our best content and tools below.
  </p>

  <a href="/">Go Back Home</a>

  <p class="small">
    Looking for automation tools? Check our latest <a href="/manychat-review">ManyChat review</a>.
  </p>
</div>

</body>
</html>
